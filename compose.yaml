services:
  postgres:
    image: postgres:17-alpine
    container_name: yomilog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yomilog
      POSTGRES_PASSWORD: yomilog
      POSTGRES_DB: yomilog
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yomilog -d yomilog"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
